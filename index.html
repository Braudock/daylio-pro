<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Daylio Pro</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f0e17;
      color: white;
      min-height: 100vh;
    }

    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    textarea,
    input {
      font-family: 'Inter', sans-serif;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-12px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes pulseRing {
      0% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5)
      }

      100% {
        box-shadow: 0 0 0 16px rgba(239, 68, 68, 0)
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.92)
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1)
      }
    }

    .fade-in {
      animation: fadeIn 0.35s ease-out both;
    }

    .slide-down {
      animation: slideDown 0.3s ease-out both;
    }

    .spin {
      animation: spin 1s linear infinite;
    }

    .toast-enter {
      animation: toastIn 0.35s ease-out both;
    }

    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 18px;
      transition: all 0.25s;
    }

    .card:hover {
      background: rgba(255, 255, 255, 0.07);
      transform: translateY(-1px);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.3);
    }

    textarea {
      background: rgba(255, 255, 255, 0.05) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      color: white !important;
      resize: none;
      border-radius: 12px;
      padding: 14px 56px 14px 14px;
      width: 100%;
      font-size: 14px;
      line-height: 1.6;
    }

    textarea::placeholder {
      color: rgba(255, 255, 255, 0.3) !important;
    }

    textarea:focus {
      border-color: rgba(99, 102, 241, 0.5) !important;
      outline: none !important;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12) !important;
    }

    input {
      background: rgba(255, 255, 255, 0.06) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      color: white !important;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 12px;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.35) !important;
    }

    input:focus {
      border-color: rgba(99, 102, 241, 0.5) !important;
      outline: none !important;
    }

    button {
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }

    .progress-bar {
      transition: width 0.9s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    // ===========================================================
    // ⚙️ CONFIGURAÇÃO OBRIGATÓRIA (Já preenchida!)
    // ===========================================================
    const GEMINI_API_KEY = "AIzaSyBRjCpBTnYm1Uzp3NWvHS9qwwf_b7Bh3MA"; 
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxs-7_OxkUwvHtLg0Y2cOyhFx7pyziJcCZTV8ZN24gU1alOyC_vPodPu9rbzTOcbv1cnQ/exec"; 
    // ===========================================================

    const { useState, useEffect, useRef, useCallback } = React;

    // ---- Ícones SVG inline ----
    const Icon = ({ d, size = 16, style = {} }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
        {Array.isArray(d) ? d.map((p, i) => <path key={i} d={p} />) : <path d={d} />}

    );
    const Icons = {
      mic: "M12 1a3 3 0 0 1 3 3v8a3 3 0 0 1-6 0V4a3 3 0 0 1 3-3zM19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8",
      micOff: "M1 1l22 22M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23M12 19v4M8 23h8",
      send: "M22 2L11 13M22 2L15 22 11 13 2 9 22 2",
      loader: "M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83",
      brain: "M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2zM14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.46 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2z",
      calendar: "M3 4h18v18H3zM16 2v4M8 2v4M3 10h18",
      clock: "M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zM12 6v6l4 2",
      alert: "M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01",
      check: "M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4L12 14.01l-3-3",
      download: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3",
      steth: "M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4",
      copy: "M20 9h-9a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2zM5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1",
      user: "M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M12 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8zM19 8v6M22 11h-6",
      edit: "M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z",
      plus: "M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zM12 8v8M8 12h8",
      x: "M18 6L6 18M6 6l12 12",
      chevron: "M6 9l6 6 6-6",
      sparkle: "M12 3L9.5 8.5 3 12l6.5 3.5L12 21l2.5-5.5L21 12l-6.5-3.5L12 3z",
      trend: "M23 6l-9.5 9.5-5-5L1 17M17 6h6v6",
      heart: "M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z",
      zap: "M13 2L3 14h9l-1 8 10-12h-9l1-8z",
      wind: "M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2M9.6 4.6A2 2 0 1 1 11 8H2M12.6 19.4A2 2 0 1 0 14 16H2",
      bar: "M18 20V10M12 20V4M6 20v-6",
      shield: "M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z",
    };

    // ---- Persistência: Google Sheets (via Apps Script) ou localStorage ----
    const STORAGE_KEY = 'daylio_pro_logs';
    const useSheets = () => APPS_SCRIPT_URL.trim() !== '' && APPS_SCRIPT_URL !== 'SUA_URL_DO_APPS_SCRIPT_AQUI';

    const api = {
      async load() {
        if (!useSheets()) {
          try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
        }
        try {
          const r = await fetch(APPS_SCRIPT_URL);
          const d = await r.json();
          return d.logs || [];
        } catch { return []; }
      },
      async add(log) {
        if (!useSheets()) {
          // salvar no localStorage
          return;
        }
        await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'add', log }) });
      },
      async update(log) {
        if (!useSheets()) return;
        await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'update', log }) });
      },
      async remove(id) {
        if (!useSheets()) return;
        await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id }) });
      },
      async migrate(logs) {
        if (!useSheets() || !logs.length) return;
        await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'migrate', logs }) });
      }
    };

    const saveLocalLogs = (logs) => {
      if (!useSheets()) localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
    };

    // ---- Helpers ----
    const getMoodEmoji = m => ({ 'muito bom': '🤩', 'bom': '😊', 'estável': '😌', 'baixo': '😔', 'muito baixo': '😢' }[m?.toLowerCase()] || '😶');
    const getMoodScore = m => ({ 'muito bom': 100, 'bom': 80, 'estável': 60, 'baixo': 35, 'muito baixo': 15 }[m?.toLowerCase()] || 60);
    const getEnergyScore = e => ({ 'alta': 100, 'média': 60, 'baixa': 25 }[e?.toLowerCase()] || 60);
    const getStressScore = s => ({ 'baixo': 15, 'médio': 55, 'alto': 95 }[s?.toLowerCase()] || 15);

    const getMoodBadgeStyle = m => {
      const map = { 'muito bom': '#34d399', 'bom': '#4ade80', 'estável': '#60a5fa', 'baixo': '#fbbf24', 'muito baixo': '#f87171' };
      const c = map[m?.toLowerCase()] || '#94a3b8';
      return { fontSize: '12px', fontWeight: 700, padding: '5px 12px', borderRadius: '20px', background: `${c}22`, color: c, border: `1px solid ${c}44`, whiteSpace: 'nowrap' };
    };
    const getMoodBarColor = m => ({ 'muito bom': 'linear-gradient(90deg,#34d399,#06b6d4)', 'bom': 'linear-gradient(90deg,#4ade80,#34d399)', 'estável': 'linear-gradient(90deg,#60a5fa,#818cf8)', 'baixo': 'linear-gradient(90deg,#fbbf24,#f97316)', 'muito baixo': 'linear-gradient(90deg,#f87171,#ef4444)' }[m?.toLowerCase()] || 'linear-gradient(90deg,#94a3b8,#64748b)');
    const getEnergyBarColor = e => ({ 'alta': 'linear-gradient(90deg,#fbbf24,#f59e0b)', 'média': 'linear-gradient(90deg,#60a5fa,#6366f1)', 'baixa': 'linear-gradient(90deg,#94a3b8,#64748b)' }[e?.toLowerCase()] || 'linear-gradient(90deg,#94a3b8,#64748b)');
    const getStressBarColor = s => ({ 'baixo': 'linear-gradient(90deg,#34d399,#06b6d4)', 'médio': 'linear-gradient(90deg,#fbbf24,#f97316)', 'alto': 'linear-gradient(90deg,#f87171,#ef4444)' }[s?.toLowerCase()] || 'linear-gradient(90deg,#94a3b8,#64748b)');
    const getMoodStripColor = m => ({ 'muito bom': '#34d399', 'bom': '#4ade80', 'estável': '#818cf8', 'baixo': '#f97316', 'muito baixo': '#ef4444' }[m?.toLowerCase()] || '#475569');

    // ---- App Principal ----
    function App() {
      const [logs, setLogs] = useState([]);
      const [isLoadingData, setIsLoadingData] = useState(true);
      const [transcript, setTranscript] = useState('');
      const [isRecording, setIsRecording] = useState(false);
      const [isProcessing, setIsProcessing] = useState(false);
      const [inputMode, setInputMode] = useState('voice'); // 'voice' | 'text'
      const [error, setError] = useState('');
      const [toasts, setToasts] = useState([]);
      const [expandedId, setExpandedId] = useState(null);
      const [showClinical, setShowClinical] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [analysisText, setAnalysisText] = useState('');
      const recognitionRef = useRef(null);
      const textareaRef = useRef(null);
      // Refs para controle de gravação contínua no mobile
      const isRecordingRef = useRef(false);
      const cumulativeRef = useRef('');
      const restartTimerRef = useRef(null);

      // ---- Carregar dados (Sheets ou localStorage) + migração ----
      useEffect(() => {
        const init = async () => {
          setIsLoadingData(true);
          const localLogs = (() => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; } })();

          if (useSheets()) {
            const sheetsLogs = await api.load();
            // Se Sheets está vazio mas localStorage tem dados → migrar
            if (sheetsLogs.length === 0 && localLogs.length > 0) {
              await api.migrate(localLogs);
              setLogs(localLogs);
              localStorage.removeItem(STORAGE_KEY); // limpa local após migrar
            } else {
              setLogs(sheetsLogs);
            }
          } else {
            setLogs(localLogs);
          }
          setIsLoadingData(false);
        };
        init();
      }, []);

      // Salvar no localStorage quando não usa Sheets
      useEffect(() => { saveLocalLogs(logs); }, [logs]);

      const toast = (msg, type = 'success') => {
        const id = Date.now();
        setToasts(p => [...p, { id, msg, type }]);
        setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 4000);
      };

      // ---- Reconhecimento de voz com reinício automático (mobile) ----
      useEffect(() => {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) return;

        const createRecognition = () => {
          const r = new SR();
          r.continuous = true;
          r.interimResults = true;
          r.lang = 'pt-BR';
          r.maxAlternatives = 1;

          r.onresult = (e) => {
            // Coleta tudo que veio neste evento
            let sessionText = '';
            for (let i = 0; i < e.results.length; i++) {
              sessionText += e.results[i][0].transcript;
            }
            // Atualiza o textarea com o acumulado anterior + o atual
            setTranscript(cumulativeRef.current + sessionText);
          };

          r.onspeechend = () => {
            // Captura o que foi dito antes de reiniciar
            // (o onresult já atualizou o transcript, precisamos salvar no cumulative)
          };

          r.onend = () => {
            if (isRecordingRef.current) {
              // Salva o transcript atual no cumulative antes de reiniciar
              setTranscript(prev => {
                cumulativeRef.current = prev;
                return prev;
              });
              // Reinicia após pequeno delay (evita erro no Chrome mobile)
              restartTimerRef.current = setTimeout(() => {
                if (isRecordingRef.current && recognitionRef.current) {
                  try { recognitionRef.current.start(); } catch (_) { }
                }
              }, 200);
            } else {
              setIsRecording(false);
            }
          };

          r.onerror = (e) => {
            if (e.error === 'no-speech') return; // silencioso — normal no mobile
            if (e.error === 'aborted') return;   // ignorar aborts de reinício
            setError('Erro no microfone: ' + e.error + '. Tente novamente.');
            isRecordingRef.current = false;
            setIsRecording(false);
          };

          return r;
        };

        recognitionRef.current = createRecognition();
      }, []);

      const toggleRecording = () => {
        if (!recognitionRef.current) { setError('Reconhecimento de voz não suportado. Use o modo Texto.'); return; }
        if (isRecordingRef.current) {
          // Parar gravação explicitamente
          isRecordingRef.current = false;
          clearTimeout(restartTimerRef.current);
          try { recognitionRef.current.stop(); } catch (_) { }
          setIsRecording(false);
        } else {
          // Iniciar gravação
          cumulativeRef.current = ''; // zera acumulado
          setTranscript('');
          setError('');
          isRecordingRef.current = true;
          setIsRecording(true);
          try { recognitionRef.current.start(); } catch (_) { }
        }
      };

      // ---- Processar com IA ou fallback ----
      const processAndSave = async () => {
        if (!transcript.trim()) { setError('Fale ou escreva algo antes de salvar.'); return; }
        setIsProcessing(true); setError('');

        const now = new Date();
        const dateStr = now.toLocaleDateString('pt-BR');
        const timeStr = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

        let structured = null;

        if (GEMINI_API_KEY.trim() && GEMINI_API_KEY !== 'SUA_CHAVE_GEMINI_AQUI') {
          try {
            const payload = {
              contents: [{ parts: [{ text: `Relato: "${transcript}"` }] }],
              systemInstruction: { parts: [{ text: `Extraia JSON do relato. data:DD/MM/AAAA(atual:${dateStr}), hora:HH:MM(atual:${timeStr}), evento:resumo curto, atividade:contexto, humor:um de "Muito baixo"|"Baixo"|"Estável"|"Bom"|"Muito bom", energia:um de "Baixa"|"Média"|"Alta", estresse:um de "Baixo"|"Médio"|"Alto", pensamentos:resumo, observacoes:detalhes.` }] },
              generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { data: { type: "STRING" }, hora: { type: "STRING" }, evento: { type: "STRING" }, atividade: { type: "STRING" }, humor: { type: "STRING" }, energia: { type: "STRING" }, estresse: { type: "STRING" }, pensamentos: { type: "STRING" }, observacoes: { type: "STRING" } }, required: ["data", "hora", "evento", "atividade", "humor", "energia", "estresse", "pensamentos", "observacoes"] } }
            };
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_API_KEY}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (!res.ok) throw new Error(`API ${res.status}`);
            const json = await res.json();
            structured = JSON.parse(json.candidates[0].content.parts[0].text);
          } catch (e) {
            console.warn('IA falhou, usando fallback:', e.message);
          }
        }

        // Fallback: estruturar localmente
        if (!structured) {
          structured = {
            data: dateStr, hora: timeStr,
            evento: transcript.slice(0, 60) + (transcript.length > 60 ? '...' : ''),
            atividade: 'Geral',
            humor: 'Estável', energia: 'Média', estresse: 'Baixo',
            pensamentos: 'Não classificado pela IA.',
            observacoes: transcript,
          };
        }

        const newLog = { ...structured, id: Date.now().toString(), timestamp: Date.now(), rawTranscript: transcript };
        setLogs(prev => [newLog, ...prev]);
        await api.add(newLog);
        setTranscript('');
        toast(GEMINI_API_KEY.trim() !== 'SUA_CHAVE_GEMINI_AQUI' ? '✨ Registro salvo com IA!' : '💾 Registro salvo localmente!');
        setIsProcessing(false);
      };

      const saveClinicalAnalysis = async (id) => {
        const updatedLog = logs.find(l => l.id === id);
        updatedLog.analiseTerapeuta = analysisText;
        setLogs(prev => prev.map(l => l.id === id ? updatedLog : l));
        await api.update(updatedLog);
        setEditingId(null); setAnalysisText('');
        toast('Análise clínica salva.');
      };

      const deleteLog = async (id) => {
        if (window.confirm('Excluir este registro?')) {
          setLogs(prev => prev.filter(l => l.id !== id));
          await api.remove(id);
          toast('Registro excluído.', 'info');
        }
      };

      const exportCSV = () => {
        if (!logs.length) return;
        const headers = ['Data', 'Hora', 'Evento', 'Atividade', 'Humor', 'Energia', 'Estresse', 'Pensamentos', 'Observações', 'Transcrição', 'Análise Terapeuta'];
        const rows = logs.map(l => [l.data, l.hora, l.evento, l.atividade, l.humor, l.energia, l.estresse, l.pensamentos, l.observacoes, l.rawTranscript, l.analiseTerapeuta || ''].map(v => `"${String(v || '').replace(/"/g, '""')}"`).join(','));
        const csv = 'data:text/csv;charset=utf-8,\uFEFF' + [headers.join(','), ...rows].join('\n');
        const a = document.createElement('a'); a.href = encodeURI(csv); a.download = `daylio_${new Date().toISOString().split('T')[0]}.csv`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
      };

      const recentLogs = logs.slice(0, 7);
      const avgMood = recentLogs.length ? recentLogs.reduce((acc, l) => acc + ({ 'muito baixo': 1, 'baixo': 2, 'estável': 3, 'bom': 4, 'muito bom': 5 }[l.humor?.toLowerCase()] || 3), 0) / recentLogs.length : 0;
      const moodTrend = avgMood >= 4 ? '↑ Positivo' : avgMood >= 3 ? '→ Estável' : '↓ Atenção';
      const moodTrendColor = avgMood >= 4 ? '#34d399' : avgMood >= 3 ? '#60a5fa' : '#fbbf24';

      const S = { // Styles
        header: { position: 'sticky', top: 0, zIndex: 30, background: 'rgba(15,14,23,0.85)', backdropFilter: 'blur(20px)', borderBottom: '1px solid rgba(255,255,255,0.07)', WebkitBackdropFilter: 'blur(20px)' },
        headerInner: { maxWidth: 760, margin: '0 auto', padding: '14px 20px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' },
        main: { maxWidth: 760, margin: '0 auto', padding: '24px 20px 80px' },
        iconBox: (grad) => ({ width: 38, height: 38, borderRadius: 11, background: grad, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }),
      };

      return (
        <div style={{ minHeight: '100vh', background: '#0f0e17', fontFamily: "'Inter',sans-serif" }}>
          {/* Ambient orbs */}
          <div style={{ position: 'fixed', inset: 0, pointerEvents: 'none', overflow: 'hidden', zIndex: 0 }}>
            <div style={{ position: 'absolute', top: '-15%', left: '-10%', width: '55%', height: '55%', background: 'radial-gradient(circle,rgba(99,102,241,0.13) 0%,transparent 70%)', borderRadius: '50%' }} />
            <div style={{ position: 'absolute', bottom: '-10%', right: '-5%', width: '50%', height: '50%', background: 'radial-gradient(circle,rgba(168,85,247,0.1) 0%,transparent 70%)', borderRadius: '50%' }} />
            <div style={{ position: 'absolute', top: '45%', right: '15%', width: '30%', height: '30%', background: 'radial-gradient(circle,rgba(52,211,153,0.06) 0%,transparent 70%)', borderRadius: '50%' }} />
          </div>

          {/* Toasts */}
          <div style={{ position: 'fixed', bottom: 24, left: '50%', transform: 'translateX(-50%)', zIndex: 9999, display: 'flex', flexDirection: 'column', gap: 8, alignItems: 'center', width: '100%', maxWidth: 400, padding: '0 16px', pointerEvents: 'none' }}>
            {toasts.map(t => (
              <div key={t.id} className="toast-enter" style={{ width: '100%', background: t.type === 'info' ? 'rgba(99,102,241,0.92)' : 'rgba(16,185,129,0.92)', backdropFilter: 'blur(16px)', borderRadius: 12, padding: '11px 16px', display: 'flex', alignItems: 'center', gap: 10, boxShadow: '0 8px 32px rgba(0,0,0,0.35)', border: '1px solid rgba(255,255,255,0.15)' }}>
                <Icon d={Icons.check} size={15} style={{ flexShrink: 0, color: 'white' }} />
                <span style={{ fontSize: 13, fontWeight: 500, color: 'white' }}>{t.msg}</span>
              </div>
            ))}
          </div>

          {/* Header */}
          <header style={S.header}>
            <div style={S.headerInner}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <div style={{ ...S.iconBox('linear-gradient(135deg,#6366f1,#8b5cf6)'), boxShadow: '0 4px 18px rgba(99,102,241,0.4)' }}>
                  <Icon d={Icons.sparkle} size={18} style={{ color: 'white' }} />
                </div>
                <div>
                  <h1 style={{ fontSize: 17, fontWeight: 800, letterSpacing: '-0.3px', background: 'linear-gradient(135deg,#a78bfa,#60a5fa)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text', lineHeight: 1.2 }}>Meu Daylio Pro</h1>
                  <span style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)' }}>Registro Inteligente de Saúde Mental</span>
                </div>
              </div>
              <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                {(!GEMINI_API_KEY.trim() || GEMINI_API_KEY === 'SUA_CHAVE_GEMINI_AQUI') && (
                  <span title="Sem chave Gemini: registros salvos localmente sem classificação IA" style={{ fontSize: 11, background: 'rgba(251,191,36,0.15)', border: '1px solid rgba(251,191,36,0.3)', color: '#fbbf24', padding: '5px 10px', borderRadius: 20, cursor: 'help' }}>⚠️ Modo Local</span>
                )}
                <button onClick={() => setShowClinical(p => !p)} style={{ fontSize: 12, background: showClinical ? 'rgba(168,85,247,0.2)' : 'rgba(255,255,255,0.07)', border: showClinical ? '1px solid rgba(168,85,247,0.35)' : '1px solid rgba(255,255,255,0.1)', color: showClinical ? '#c084fc' : 'rgba(255,255,255,0.7)', padding: '7px 13px', borderRadius: 20, fontWeight: 500, display: 'flex', alignItems: 'center', gap: 6, transition: 'all 0.2s' }}>
                  <Icon d={Icons.steth} size={13} /> Dra. Aline Chen
                  <Icon d={Icons.chevron} size={12} style={{ transform: showClinical ? 'rotate(180deg)' : 'rotate(0)', transition: 'transform 0.2s' }} />
                </button>
              </div>
            </div>

            {/* Painel terapeuta */}
            {showClinical && (
              <div className="slide-down" style={{ maxWidth: 760, margin: '0 auto', padding: '14px 20px 18px', borderTop: '1px solid rgba(255,255,255,0.06)', display: 'flex', flexDirection: 'column', gap: 12 }}>
                {/* Banner instrução */}
                <div style={{ background: 'rgba(168,85,247,0.12)', border: '1px solid rgba(168,85,247,0.3)', borderRadius: 14, padding: '13px 16px', display: 'flex', alignItems: 'center', gap: 12 }}>
                  <div style={{ fontSize: 20, flexShrink: 0 }}>🩺</div>
                  <div>
                    <span style={{ fontSize: 13, fontWeight: 700, color: '#c084fc', display: 'block', marginBottom: 3 }}>Dra. Aline Chen — Modo Clínico</span>
                    <span style={{ fontSize: 12, color: 'rgba(216,180,254,0.7)', lineHeight: 1.5 }}>Clique em qualquer registro abaixo para expandi-lo e adicionar sua análise ou observações clínicas. Tudo é salvo automaticamente.</span>
                  </div>
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                  <div style={{ background: 'rgba(99,102,241,0.08)', border: '1px solid rgba(99,102,241,0.2)', borderRadius: 14, padding: 14 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
                      <Icon d={Icons.user} size={13} style={{ color: '#818cf8' }} />
                      <span style={{ fontSize: 13, fontWeight: 700, color: '#a5b4fc' }}>Exportar Dados</span>
                    </div>
                    <p style={{ fontSize: 11, color: 'rgba(165,180,252,0.6)', marginBottom: 10, lineHeight: 1.5 }}>Exporte todos os registros e análises clínicas em CSV para usar em prontuário ou compartilhar.</p>
                    <button onClick={exportCSV} style={{ fontSize: 12, background: 'rgba(99,102,241,0.2)', border: '1px solid rgba(99,102,241,0.3)', color: '#a5b4fc', padding: '7px 14px', borderRadius: 10, fontWeight: 600, display: 'flex', alignItems: 'center', gap: 6 }}>
                      <Icon d={Icons.download} size={13} /> Exportar CSV completo
                    </button>
                  </div>
                  <div style={{ background: 'rgba(168,85,247,0.08)', border: '1px solid rgba(168,85,247,0.2)', borderRadius: 14, padding: 14 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
                      <Icon d={Icons.steth} size={13} style={{ color: '#c084fc' }} />
                      <span style={{ fontSize: 13, fontWeight: 700, color: '#c084fc' }}>Como adicionar observações</span>
                    </div>
                    <ol style={{ fontSize: 11, color: 'rgba(192,132,252,0.7)', lineHeight: 1.8, paddingLeft: 16 }}>
                      <li>Role até o histórico abaixo</li>
                      <li>Clique no registro desejado</li>
                      <li>Clique em <strong style={{ color: '#c084fc' }}>"+ Observação Clínica"</strong></li>
                      <li>Escreva e salve ✓</li>
                    </ol>
                  </div>
                </div>
              </div>
            )}
          </header>

          <main style={{ ...S.main, position: 'relative', zIndex: 1 }}>

            {/* Stats */}
            {logs.length > 0 && (
              <div className="fade-in" style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 12, marginBottom: 22 }}>
                {[
                  { label: 'Registros', value: logs.length, icon: Icons.bar, color: '#818cf8', bg: 'rgba(99,102,241,0.1)', border: 'rgba(99,102,241,0.2)' },
                  { label: 'Humor Médio', value: avgMood ? getMoodEmoji(['', 'muito baixo', 'baixo', 'estável', 'bom', 'muito bom'][Math.round(avgMood)]) + ' ' + ['', 'Atenção', 'Baixo', 'Estável', 'Bom', 'Ótimo'][Math.round(avgMood)] : '—', icon: Icons.heart, color: '#f472b6', bg: 'rgba(244,114,182,0.1)', border: 'rgba(244,114,182,0.2)' },
                  { label: 'Tendência', value: moodTrend, icon: Icons.trend, color: moodTrendColor, bg: `${moodTrendColor}18`, border: `${moodTrendColor}33` },
                ].map((s, i) => (
                  <div key={i} style={{ background: s.bg, border: `1px solid ${s.border}`, borderRadius: 14, padding: '13px 14px', display: 'flex', alignItems: 'center', gap: 10 }}>
                    <div style={{ ...S.iconBox('rgba(255,255,255,0.05)'), borderRadius: 10, width: 34, height: 34 }}>
                      <Icon d={s.icon} size={15} style={{ color: s.color }} />
                    </div>
                    <div>
                      <div style={{ fontSize: 14, fontWeight: 700, color: 'white' }}>{s.value}</div>
                      <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)', marginTop: 2 }}>{s.label}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Input */}
            <div className="card fade-in" style={{ padding: 22, marginBottom: 22, position: 'relative', overflow: 'hidden' }}>
              <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 2, background: 'linear-gradient(90deg,#6366f1,#8b5cf6,#06b6d4)', borderRadius: '18px 18px 0 0' }} />

              {/* Header + toggle de modo */}
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <div style={{ ...S.iconBox('linear-gradient(135deg,rgba(99,102,241,0.3),rgba(139,92,246,0.3))'), width: 32, height: 32, borderRadius: 10 }}>
                    <Icon d={Icons.brain} size={15} style={{ color: '#a78bfa' }} />
                  </div>
                  <div>
                    <h2 style={{ fontSize: 14, fontWeight: 700, color: 'white' }}>Novo Registro</h2>
                    <p style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)' }}>{GEMINI_API_KEY.trim() ? 'A IA irá estruturar seu relato' : 'Salvo localmente sem IA'}</p>
                  </div>
                </div>
                {/* Toggle voz/texto */}
                <div style={{ display: 'flex', background: 'rgba(255,255,255,0.06)', borderRadius: 10, padding: 3, border: '1px solid rgba(255,255,255,0.08)', gap: 2 }}>
                  {[{ id: 'voice', label: '🎙️ Voz' }, { id: 'text', label: '✏️ Texto' }].map(m => (
                    <button key={m.id} onClick={() => { setInputMode(m.id); if (isRecording) { recognitionRef.current?.stop(); } }} style={{ padding: '5px 12px', borderRadius: 8, border: 'none', fontSize: 12, fontWeight: 600, transition: 'all 0.2s', background: inputMode === m.id ? 'rgba(99,102,241,0.5)' : 'transparent', color: inputMode === m.id ? 'white' : 'rgba(255,255,255,0.45)', boxShadow: inputMode === m.id ? '0 2px 8px rgba(99,102,241,0.3)' : 'none' }}>
                      {m.label}
                    </button>
                  ))}
                </div>
              </div>

              {/* Área de input — muda conforme o modo */}
              <div style={{ position: 'relative' }}>
                <textarea
                  ref={textareaRef}
                  rows={4}
                  style={{ height: inputMode === 'voice' ? 110 : 130, paddingRight: inputMode === 'voice' ? 58 : 16, paddingBottom: inputMode === 'text' ? 14 : undefined }}
                  placeholder={inputMode === 'voice' ? 'Clique em 🎙️ Voz e fale, ou também pode digitar diretamente aqui...' : 'Escreva seu relato aqui. Ex: "Acordei bem, tomei café. Humor ok, mas energia baixa."'}
                  value={transcript}
                  onChange={e => setTranscript(e.target.value)}
                  disabled={isProcessing}
                  autoFocus={inputMode === 'text'}
                />
                {/* Botão mic — só aparece no modo voz */}
                {inputMode === 'voice' && (
                  <button onClick={toggleRecording} disabled={isProcessing} style={{ position: 'absolute', bottom: 12, right: 12, width: 40, height: 40, borderRadius: 11, border: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', background: isRecording ? 'linear-gradient(135deg,#ef4444,#dc2626)' : 'linear-gradient(135deg,#6366f1,#8b5cf6)', boxShadow: isRecording ? '0 4px 18px rgba(239,68,68,0.5)' : '0 4px 18px rgba(99,102,241,0.4)', opacity: isProcessing ? 0.5 : 1, transition: 'all 0.2s' }}>
                    <Icon d={isRecording ? Icons.micOff : Icons.mic} size={17} style={{ color: 'white' }} />
                  </button>
                )}
              </div>

              {/* Contador de caracteres no modo texto */}
              {inputMode === 'text' && transcript.length > 0 && (
                <div style={{ textAlign: 'right', marginTop: 4, fontSize: 11, color: 'rgba(255,255,255,0.25)' }}>{transcript.length} caracteres</div>
              )}

              <div style={{ marginTop: 12, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12 }}>
                <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.4)', display: 'flex', alignItems: 'center', gap: 7 }}>
                  {isRecording ? (
                    <>
                      <span style={{ width: 7, height: 7, borderRadius: '50%', background: '#ef4444', display: 'inline-block', animation: 'pulseRing 1.5s ease-out infinite' }} />
                      <span style={{ color: '#f87171', fontWeight: 500 }}>Ouvindo... fale agora</span>
                    </>
                  ) : inputMode === 'voice' ? <span style={{ opacity: 0.7 }}>Pressione o mic para gravar</span> : <span style={{ opacity: 0.7 }}>Digite acima e clique em Salvar</span>}
                </div>
                <button onClick={processAndSave} disabled={isProcessing || !transcript.trim()} style={{ padding: '9px 20px', borderRadius: 11, border: 'none', fontWeight: 700, fontSize: 13, display: 'flex', alignItems: 'center', gap: 7, background: (isProcessing || !transcript.trim()) ? 'rgba(255,255,255,0.07)' : 'linear-gradient(135deg,#6366f1,#8b5cf6)', color: (isProcessing || !transcript.trim()) ? 'rgba(255,255,255,0.3)' : 'white', boxShadow: (!isProcessing && transcript.trim()) ? '0 4px 18px rgba(99,102,241,0.4)' : 'none', transition: 'all 0.2s', whiteSpace: 'nowrap', opacity: (isProcessing || !transcript.trim()) ? 0.6 : 1 }}>
                  {isProcessing ? <><Icon d={Icons.loader} size={14} style={{ color: 'white' }} className="spin" />&nbsp;Processando...</> : <><Icon d={Icons.sparkle} size={14} style={{ color: 'white' }} />&nbsp;Salvar Registro</>}
                </button>
              </div>
            </div>

            {/* Error */}
            {error && (
              <div className="fade-in" style={{ background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.25)', borderRadius: 12, padding: '11px 14px', marginBottom: 14, display: 'flex', alignItems: 'center', gap: 9, fontSize: 13, color: '#fca5a5' }}>
                <Icon d={Icons.alert} size={14} style={{ flexShrink: 0 }} />
                {error}
                <button onClick={() => setError('')} style={{ marginLeft: 'auto', background: 'none', border: 'none', color: '#fca5a5', padding: 2 }}><Icon d={Icons.x} size={13} /></button>
              </div>
            )}

            {/* Histórico */}
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
              <div>
                <h2 style={{ fontSize: 14, fontWeight: 700, color: 'rgba(255,255,255,0.9)' }}>Histórico</h2>
                <p style={{ fontSize: 11, color: 'rgba(255,255,255,0.35)', marginTop: 2 }}>{logs.length} registros • mais recente primeiro</p>
              </div>
              <button onClick={exportCSV} disabled={!logs.length} style={{ padding: '7px 13px', background: 'rgba(99,102,241,0.1)', border: '1px solid rgba(99,102,241,0.25)', color: '#a5b4fc', borderRadius: 20, fontSize: 12, fontWeight: 600, display: 'flex', alignItems: 'center', gap: 6, opacity: logs.length ? 1 : 0.4 }}>
                <Icon d={Icons.download} size={13} /> Exportar CSV
              </button>
            </div>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {logs.length === 0 ? (
                <div className="card" style={{ padding: '44px 24px', textAlign: 'center' }}>
                  <div style={{ ...S.iconBox('rgba(99,102,241,0.1)'), width: 60, height: 60, borderRadius: 18, margin: '0 auto 14px', justifyContent: 'center' }}>
                    <Icon d={Icons.brain} size={26} style={{ color: 'rgba(99,102,241,0.5)' }} />
                  </div>
                  <p style={{ color: 'rgba(255,255,255,0.5)', fontSize: 15, fontWeight: 500, marginBottom: 6 }}>Nenhum registro ainda.</p>
                  <p style={{ color: 'rgba(255,255,255,0.3)', fontSize: 13 }}>Comece gravando seu primeiro momento do dia!</p>
                </div>
              ) : logs.map((log, idx) => {
                const isExp = expandedId === log.id;
                return (
                  <div key={log.id} className="card fade-in" style={{ padding: 0, overflow: 'hidden', animationDelay: `${Math.min(idx, 5) * 0.04}s` }}>
                    {/* Mood strip */}
                    <div style={{ height: 3, background: `linear-gradient(90deg,${getMoodStripColor(log.humor)},${getMoodStripColor(log.humor)}88)` }} />

                    {/* Card header — clicável */}
                    <div style={{ padding: '16px 18px', cursor: 'pointer' }} onClick={() => setExpandedId(isExp ? null : log.id)}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12 }}>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ display: 'flex', alignItems: 'center', gap: 9, marginBottom: 5 }}>
                            <span style={{ fontSize: 20, lineHeight: 1 }}>{getMoodEmoji(log.humor)}</span>
                            <h3 style={{ fontSize: 14, fontWeight: 700, color: 'white', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', textTransform: 'capitalize' }}>{log.evento}</h3>
                          </div>
                          <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap' }}>
                            <span style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)', display: 'flex', alignItems: 'center', gap: 4 }}><Icon d={Icons.calendar} size={11} />{log.data}</span>
                            <span style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)', display: 'flex', alignItems: 'center', gap: 4 }}><Icon d={Icons.clock} size={11} />{log.hora}</span>
                            {log.atividade && <span style={{ fontSize: 11, background: 'rgba(255,255,255,0.07)', color: 'rgba(255,255,255,0.6)', padding: '2px 8px', borderRadius: 20 }}>{log.atividade}</span>}
                          </div>
                        </div>
                        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 7 }}>
                          <span style={getMoodBadgeStyle(log.humor)}>{log.humor}</span>
                          <Icon d={Icons.chevron} size={13} style={{ color: 'rgba(255,255,255,0.3)', transform: isExp ? 'rotate(180deg)' : 'rotate(0)', transition: 'transform 0.25s' }} />
                        </div>
                      </div>

                      {/* Progress bars */}
                      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10, marginTop: 12 }}>
                        {[
                          { label: 'Humor', score: getMoodScore(log.humor), barColor: getMoodBarColor(log.humor), icon: Icons.heart },
                          { label: 'Energia', score: getEnergyScore(log.energia), barColor: getEnergyBarColor(log.energia), icon: Icons.zap },
                          { label: 'Estresse', score: getStressScore(log.estresse), barColor: getStressBarColor(log.estresse), icon: Icons.wind },
                        ].map((m, i) => (
                          <div key={i}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                              <span style={{ fontSize: 10, color: 'rgba(255,255,255,0.4)', display: 'flex', alignItems: 'center', gap: 3, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.5px' }}>
                                <Icon d={m.icon} size={10} />{m.label}
                              </span>
                              <span style={{ fontSize: 10, color: 'rgba(255,255,255,0.6)', fontWeight: 600 }}>{m.score}%</span>
                            </div>
                            <div style={{ height: 4, background: 'rgba(255,255,255,0.07)', borderRadius: 4, overflow: 'hidden' }}>
                              <div className="progress-bar" style={{ height: '100%', width: `${m.score}%`, background: m.barColor, borderRadius: 4 }} />
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Expanded */}
                    {isExp && (
                      <div className="fade-in" style={{ borderTop: '1px solid rgba(255,255,255,0.06)', padding: '16px 18px', background: 'rgba(0,0,0,0.18)' }}>
                        {log.pensamentos && (
                          <div style={{ background: 'rgba(99,102,241,0.08)', border: '1px solid rgba(99,102,241,0.15)', borderRadius: 11, padding: '11px 13px', marginBottom: 10 }}>
                            <span style={{ fontSize: 10, fontWeight: 700, color: '#818cf8', textTransform: 'uppercase', display: 'block', marginBottom: 5 }}>💭 Pensamentos</span>
                            <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.75)', lineHeight: 1.6 }}>{log.pensamentos}</p>
                          </div>
                        )}
                        {log.observacoes && (
                          <div style={{ background: 'rgba(52,211,153,0.06)', border: '1px solid rgba(52,211,153,0.15)', borderRadius: 11, padding: '11px 13px', marginBottom: 10 }}>
                            <span style={{ fontSize: 10, fontWeight: 700, color: '#34d399', letterSpacing: '1px', textTransform: 'uppercase', display: 'block', marginBottom: 5 }}>📝 Relato Original</span>
                            <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.75)', lineHeight: 1.6 }}>{log.observacoes}</p>
                          </div>
                        )}

                        {/* Área clínica */}
                        <div style={{ borderTop: '1px solid rgba(255,255,255,0.05)', paddingTop: 12, marginTop: 4 }}>
                          {log.analiseTerapeuta ? (
                            editingId === log.id ? (
                              <div style={{ background: 'rgba(168,85,247,0.08)', border: '1px solid rgba(168,85,247,0.2)', borderRadius: 11, padding: 13 }}>
                                <span style={{ fontSize: 10, fontWeight: 700, color: '#c084fc', textTransform: 'uppercase', letterSpacing: '1px', display: 'flex', alignItems: 'center', gap: 6, marginBottom: 9 }}><Icon d={Icons.steth} size={11} /> Editando</span>
                                <textarea value={analysisText} onChange={e => setAnalysisText(e.target.value)} rows={3} style={{ minHeight: 70 }} />
                                <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8, marginTop: 9 }}>
                                  <button onClick={() => setEditingId(null)} style={{ padding: '6px 13px', background: 'transparent', border: '1px solid rgba(255,255,255,0.1)', color: 'rgba(255,255,255,0.5)', borderRadius: 8, fontSize: 12, fontWeight: 500 }}>Cancelar</button>
                                  <button onClick={() => saveClinicalAnalysis(log.id)} style={{ padding: '6px 14px', background: 'linear-gradient(135deg,rgba(168,85,247,0.5),rgba(219,39,119,0.4))', border: '1px solid rgba(168,85,247,0.4)', color: 'white', borderRadius: 8, fontSize: 12, fontWeight: 700 }}>Salvar</button>
                                </div>
                              </div>
                            ) : (
                              <div style={{ background: 'rgba(168,85,247,0.08)', border: '1px solid rgba(168,85,247,0.2)', borderRadius: 11, padding: 12 }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 7 }}>
                                  <span style={{ fontSize: 10, fontWeight: 700, color: '#c084fc', textTransform: 'uppercase', letterSpacing: '1px', display: 'flex', alignItems: 'center', gap: 5 }}><Icon d={Icons.steth} size={11} /> Análise Clínica</span>
                                  <button onClick={() => { setEditingId(log.id); setAnalysisText(log.analiseTerapeuta); }} style={{ width: 27, height: 27, borderRadius: 7, background: 'rgba(168,85,247,0.15)', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#c084fc' }}>
                                    <Icon d={Icons.edit} size={12} />
                                  </button>
                                </div>
                                <p style={{ fontSize: 13, color: 'rgba(216,180,254,0.9)', lineHeight: 1.6, whiteSpace: 'pre-wrap' }}>{log.analiseTerapeuta}</p>
                              </div>
                            )
                          ) : editingId === log.id ? (
                            <div className="fade-in" style={{ background: 'rgba(168,85,247,0.08)', border: '1px solid rgba(168,85,247,0.2)', borderRadius: 11, padding: 13 }}>
                              <span style={{ fontSize: 10, fontWeight: 700, color: '#c084fc', textTransform: 'uppercase', letterSpacing: '1px', display: 'flex', alignItems: 'center', gap: 6, marginBottom: 9 }}><Icon d={Icons.steth} size={11} /> Novo Comentário</span>
                              <textarea value={analysisText} onChange={e => setAnalysisText(e.target.value)} rows={3} placeholder="Observações, insights, direcionamentos..." style={{ minHeight: 70 }} autoFocus />
                              <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8, marginTop: 9 }}>
                                <button onClick={() => setEditingId(null)} style={{ padding: '6px 13px', background: 'transparent', border: '1px solid rgba(255,255,255,0.1)', color: 'rgba(255,255,255,0.5)', borderRadius: 8, fontSize: 12, fontWeight: 500 }}>Cancelar</button>
                                <button onClick={() => saveClinicalAnalysis(log.id)} disabled={!analysisText.trim()} style={{ padding: '6px 14px', background: 'linear-gradient(135deg,rgba(168,85,247,0.5),rgba(219,39,119,0.4))', border: '1px solid rgba(168,85,247,0.4)', color: 'white', borderRadius: 8, fontSize: 12, fontWeight: 700, opacity: analysisText.trim() ? 1 : 0.4 }}>Salvar</button>
                              </div>
                            </div>
                          ) : (
                            <div style={{ display: 'flex', gap: 8, alignItems: 'center', justifyContent: 'space-between' }}>
                              <button onClick={() => { setEditingId(log.id); setAnalysisText(''); }} style={{ background: 'rgba(168,85,247,0.1)', border: '1px solid rgba(168,85,247,0.35)', borderRadius: 9, padding: '8px 14px', color: '#c084fc', fontSize: 12, fontWeight: 700, display: 'flex', alignItems: 'center', gap: 7, transition: 'all 0.2s' }}
                                onMouseEnter={e => { e.currentTarget.style.background = 'rgba(168,85,247,0.2)'; e.currentTarget.style.borderColor = 'rgba(168,85,247,0.55)'; }}
                                onMouseLeave={e => { e.currentTarget.style.background = 'rgba(168,85,247,0.1)'; e.currentTarget.style.borderColor = 'rgba(168,85,247,0.35)'; }}
                              >
                                <Icon d={Icons.plus} size={13} /> + Observação Clínica
                              </button>
                              <button onClick={() => deleteLog(log.id)} style={{ background: 'transparent', border: '1px solid rgba(239,68,68,0.2)', borderRadius: 9, padding: '7px 11px', color: 'rgba(248,113,113,0.5)', fontSize: 12, display: 'flex', alignItems: 'center', gap: 5, transition: 'all 0.2s' }}
                                onMouseEnter={e => { e.currentTarget.style.background = 'rgba(239,68,68,0.08)'; e.currentTarget.style.color = '#f87171'; }}
                                onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'rgba(248,113,113,0.5)'; }}
                              >
                                <Icon d={Icons.x} size={12} /> Excluir
                              </button>
                            </div>
                          )}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Config tip - Ocultado se a chave for válida */}
            {!GEMINI_API_KEY.trim() && (
              <div style={{ marginTop: 28, padding: '14px 16px', background: 'rgba(99,102,241,0.06)', border: '1px solid rgba(99,102,241,0.15)', borderRadius: 14, fontSize: 12, color: 'rgba(165,180,252,0.7)', lineHeight: 1.7 }}>
                <strong style={{ color: '#a5b4fc' }}>💡 Para ativar a classificação com IA:</strong><br />
                Abra o arquivo <code style={{ background: 'rgba(255,255,255,0.08)', padding: '1px 6px', borderRadius: 4 }}>index.html</code> num editor e preencha <code style={{ background: 'rgba(255,255,255,0.08)', padding: '1px 6px', borderRadius: 4 }}>GEMINI_API_KEY</code> com sua chave do Google AI Studio.
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
